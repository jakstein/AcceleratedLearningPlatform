<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- ============================================
         CUSTOMIZE: Change title to your subject
         Example: "Biology Learning Platform"
         ============================================ -->
    <title>Your Subject Learning Platform</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/modules.css">
    <!-- KaTeX for math (remove if not needed for your subject) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
</head>
<body>
    <nav id="sidebar">
        <div class="sidebar-header">
            <!-- ============================================
                 CUSTOMIZE: Change icon and title
                 ============================================ -->
            <h2>📚 Your Subject</h2>
            <p>Accelerated Learning Platform</p>
        </div>
        <!-- ============================================
             CUSTOMIZE: Define your navigation sections
             Each section needs a unique ID (nav-SECTIONNAME)
             Add/remove sections as needed for your curriculum
             ============================================ -->
        <div class="nav-section">
            <h3>Fundamentals</h3>
            <ul id="nav-fundamentals"></ul>
        </div>
        <div class="nav-section">
            <h3>Core Concepts</h3>
            <ul id="nav-core"></ul>
        </div>
        <div class="nav-section">
            <h3>Advanced Topics</h3>
            <ul id="nav-advanced"></ul>
        </div>
    </nav>

    <main id="content">
        <header id="module-header">
            <h1 id="module-title">Welcome</h1>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </header>
        <article id="module-content">
            <!-- Dynamic content loads here -->
        </article>
        <footer id="module-footer">
            <button id="prev-btn" class="nav-btn">← Previous</button>
            <span id="page-indicator">Module 1 of 18</span>
            <button id="next-btn" class="nav-btn">Next →</button>
        </footer>
    </main>

    <!-- Module Scripts -->
    <script src="js/utils/math-utils.js"></script>
    <script src="js/utils/canvas-utils.js"></script>
    <script src="js/utils/animation-utils.js"></script>
    <script src="js/module-registry.js"></script>
    
    <!-- ============================================
         EXAMPLE MODULES (for reference only)
         CUSTOMIZE: Replace with your own modules
         Add one script tag per module in order
         ============================================ -->
    <script src="js/modules/module-01-introduction.js"></script>
    <script src="js/modules/module-02-example-topic.js"></script>
    
    <!-- SPECIAL MODULES (97-99): AI-powered features -->
    <script src="js/modules/module-97-assignments.js"></script>
    <script src="js/modules/module-98-tests.js"></script>
    <script src="js/modules/module-99-interview-questions.js"></script>
    
    <script src="js/chat-helper.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
